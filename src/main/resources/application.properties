spring.application.name=ECOMMERCE-DEMO

spring.datasource.url=jdbc:mysql://localhost:3306/LegoStore?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=AuthDemoBackend
spring.datasource.password=PASS123

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernatej
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

spring.freemarker.template-loader-path=classpath:/templates/
spring.freemarker.suffix=.ftl
spring.freemarker.cache=false
spring.freemarker.settings.url_escaping_charset=UTF-8


# App properties
spring.frozen_prices_timeout_hours=1